version: '1.0.0'
services:
  smithereens:
    image: smithereen-docker-01 
    ports:
      - 8081:8080
    environment:
      - NODE_ENV=development

  mongodb:
    image: mongo
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password

  mysql:
    image: mysql:latest
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
        MYSQL_ROOT_PASSWORD: password
    ports:
      - 3308:3306