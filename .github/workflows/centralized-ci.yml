name: Centralized CI Pipeline

on:
  push:
  pull_request:
    types: [ opened, synchronize, reopened ]
  release:
    types: [ published ]
  create:
  issue_comment:
    types: [ created, edited ]

# Grant the minimal permissions your scanners need
permissions:
  contents: read
  id-token: write
  security-events: write
  actions: read
  checks: read
  pull-requests: read
  issues: read

jobs:
  centralized-ci:
    name: Centralized CI
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == github.event.repository.default_branch) ||
      (github.event_name == 'release') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'create' && github.event.ref_type == 'tag')
    uses: josys-src/security_template/.github/workflows/global-template.yml@main
    with:
      environment: main
    secrets: inherit